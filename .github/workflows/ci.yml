name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Assemble extension
        run: |
          cp manifest.json dist/
          cd dist && zip -r ../dockmarks-${{ github.sha }}.zip .

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: dockmarks-${{ github.sha }}
          path: dockmarks-${{ github.sha }}.zip
          retention-days: 14
